# Cloud Build pipeline triggered by push to GitHub main branch.
# Substitutions to set on the Cloud Build trigger (Console → Cloud Build → Triggers):
#   _REGION       — e.g. australia-southeast1
#   _REPO         — e.g. resume-parser-repo (Artifact Registry repo name)
#   _CLUSTER      — e.g. resume-parser-cluster (GKE cluster name)
#   _IMAGE_NAME   — e.g. resume-parser
#
# The trigger uses ${PROJECT_ID} and ${SHORT_SHA} automatically.

substitutions:
  _DOCKERHUB_USERNAME: kyled0307
  _IMAGE_NAME: resume-parser
  _CLUSTER: cluster-1
  _REGION: australia-southeast1

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 0. Login to Docker Hub
  - id: login
    name: gcr.io/cloud-builders/docker
    args:
      - login
      - --username=kyled0307
      - --password=jacksepticeye772

  # 1. Build the image
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:${SHORT_SHA}
      - --tag=docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:latest
      - .

  # 2. Push both tags to Docker Hub
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:${SHORT_SHA}

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:latest

  # 3. Deploy to GKE — capture log if this fails due to IAM permissions
  - id: deploy
    name: gcr.io/cloud-builders/gke-deploy
    args:
      - run
      - --filename=k8s/
      - --image=docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:${SHORT_SHA}
      - --location=${_REGION}
      - --cluster=${_CLUSTER}

images:
  - docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:${SHORT_SHA}
  - docker.io/${_DOCKERHUB_USERNAME}/${_IMAGE_NAME}:latest