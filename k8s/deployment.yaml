apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-parser
  labels:
    app: resume-parser
    component: api
    managed-by: capstone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resume-parser
  template:
    metadata:
      labels:
        app: resume-parser
        component: api
        managed-by: capstone
    spec:
      containers:
        - name: resume-parser
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: resume-parser-secrets
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: MAX_PDF_SIZE_BYTES
              value: "10485760"
            - name: GEMINI_MODEL
              value: "models/gemini-2.0-flash"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
